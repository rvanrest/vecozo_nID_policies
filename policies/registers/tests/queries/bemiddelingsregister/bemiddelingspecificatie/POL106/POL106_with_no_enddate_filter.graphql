query Bemiddelingspecificatie(
  $BemiddelingspecificatieID: UUID!
  $UitvoerendZorgkantoor: String!
  $ToewijzingIngangsdatum: Date!
  $ToewijzingEinddatum: Date
  $VaststellingMoment: DateTime!
  $DagVaststellingMoment: Date!
) {
  bemiddelingspecificatie(
    where: {
      bemiddelingspecificatieID: { eq: $BemiddelingspecificatieID }
      uitvoerendZorgkantoor: { eq: $UitvoerendZorgkantoor }
      toewijzingIngangsdatum: { eq: $ToewijzingIngangsdatum }
      toewijzingEinddatum: { eq: $ToewijzingEinddatum }
      vaststellingMoment: { eq: $VaststellingMoment }
    }
  ) {
    bemiddelingspecificatieID
    leveringsvorm
    zzpCode
    toewijzingIngangsdatum
    toewijzingEinddatum
    instelling
    uitvoerendZorgkantoor
    vaststellingMoment
    percentage
    pgbPercentage
    opname
    redenIntrekking
    etmalen
    instellingBestemming
    soortToewijzing
    bemiddeling {
      bemiddelingID
      wlzIndicatieID
      verantwoordelijkZorgkantoor
      verantwoordelijkheidIngangsdatum
      verantwoordelijkheidEinddatum
      client {
        bsn
        contactpersoon(
          where: {
            and: [
              {
                or: [
                  { einddatum: { eq: null } }
                  { einddatum: { gte: $ToewijzingIngangsdatum } }
                  { einddatum: { gte: $DagVaststellingMoment } }
                ]
              }
            ]
          }
        ) {
          contactpersoonID
          relatienummer
          volgorde
          soortRelatie
          rol
          relatie
          geslachtsnaam
          voorvoegselGeslachtsnaam
          partnernaam
          voorvoegselPartnernaam
          voornamen
          voorletters
          roepnaam
          naamgebruik
          geslacht
          geboortedatum
          geboortedatumgebruik
          ingangsdatum
          einddatum
          contactgegevens(
            where: {
              and: [
                {
                  or: [
                    { einddatum: { eq: null } }
                    { einddatum: { gte: $ToewijzingIngangsdatum } }
                    { einddatum: { gte: $DagVaststellingMoment } }
                  ]
                }
              ]
            }
          ) {
            contactpersoonContactgegevensID
            adressoort
            straatnaam
            huisnummer
            huisletter
            huisnummertoevoeging
            postcode
            plaatsnaam
            land
            aanduidingWoonadres
            emailadres
            telefoonnummer01
            landnummer01
            telefoonnummer02
            landnummer02
            ingangsdatum
            einddatum
          }
        }
        leefeenheid
        huisarts
        communicatievorm
        taal
        contactgegevens(
          where: {
            and: [
              {
                or: [
                  { einddatum: { eq: null } }
                  { einddatum: { gte: $ToewijzingIngangsdatum } }
                  { einddatum: { gte: $DagVaststellingMoment } }
                ]
              }
            ]
          }
        ) {
          clientContactgegevensID
          adressoort
          straatnaam
          huisnummer
          huisletter
          huisnummertoevoeging
          postcode
          plaatsnaam
          land
          aanduidingWoonadres
          emailadres
          telefoonnummer01
          landnummer01
          telefoonnummer02
          landnummer02
          ingangsdatum
          einddatum
        }
        clientID
      }
      bemiddelingspecificatie(
        where: {
          and: [
            {
              or: [
                { toewijzingEinddatum: { eq: null } }
                { toewijzingEinddatum: { gte: $ToewijzingIngangsdatum } }
                { toewijzingEinddatum: { gte: $DagVaststellingMoment } }
              ]
            }
          ]
        }
      ) {
        bemiddelingspecificatieID
        leveringsvorm
        zzpCode
        toewijzingIngangsdatum
        toewijzingEinddatum
        instelling
        uitvoerendZorgkantoor
        vaststellingMoment
        percentage
        opname
        redenIntrekking
        etmalen
        instellingBestemming
        soortToewijzing
      }
      regiehouder(
        where: {
          and: [
            {
              or: [
                { einddatum: { eq: null } }
                { einddatum: { gte: $ToewijzingIngangsdatum } }
                { einddatum: { gte: $DagVaststellingMoment } }
              ]
            }
          ]
        }
      ) {
        regiehouderID
        instelling
        ingangsdatum
        einddatum
        regierol
      }
    }
  }
}
