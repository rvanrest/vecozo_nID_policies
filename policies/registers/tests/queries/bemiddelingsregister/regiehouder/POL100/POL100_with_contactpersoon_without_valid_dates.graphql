query Regiehouder(
  $regiehouderID: UUID!
  $Instelling: String!
) {
  regiehouder(
    where: {
      regiehouderID: { eq: $regiehouderID }
      instelling: { eq: $Instelling }
    }
  ) {
    regiehouderID
    instelling
    ingangsdatum
    einddatum
    regierol
    bemiddeling {
      bemiddelingID
      wlzIndicatieID
      verantwoordelijkZorgkantoor
      verantwoordelijkheidIngangsdatum
      verantwoordelijkheidEinddatum
      client {
        bsn
        clientID
        taal
        communicatievorm
        huisarts
        leefeenheid
        contactpersoon {
          contactpersoonID
          relatienummer
          volgorde
          soortRelatie
          rol
          relatie
          geslachtsnaam
          voorvoegselGeslachtsnaam
          partnernaam
          voorvoegselPartnernaam
          voornamen
          voorletters
          roepnaam
          naamgebruik
          geslacht
          geboortedatum
          geboortedatumgebruik
          ingangsdatum
          einddatum
        }
      }
    }
  }
}