query Regiehouder(
  $regiehouderID: UUID!
  $Instelling: String!
) {
  regiehouder(
    where: {
      regiehouderID: { eq: $regiehouderID }
      instelling: { eq: $Instelling }
    }
  ) {
    regiehouderID
    instelling
    ingangsdatum
    einddatum
    regierol
    bemiddeling {
      bemiddelingID
      wlzIndicatieID
      verantwoordelijkZorgkantoor
      verantwoordelijkheidIngangsdatum
      verantwoordelijkheidEinddatum
      client {
        bsn
        clientID
        taal
        communicatievorm
        huisarts
        leefeenheid
      }
    }
  }
}