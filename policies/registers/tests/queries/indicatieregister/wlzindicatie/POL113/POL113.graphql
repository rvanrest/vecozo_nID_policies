query WlzIndicatie($wlzIndicatieID: UUID!) {
  wlzIndicatie(where: { wlzindicatieID: { eq: $wlzIndicatieID } }) {
    wlzindicatieID
    bsn
    besluitnummer
    soortWlzindicatie
    afgiftedatum
    ingangsdatum
    einddatum
    meerzorg
    initieelVerantwoordelijkZorgkantoor
    commentaar
    grondslag {
      grondslagID
      grondslag
      volgorde
    }
    geindiceerdZorgzwaartepakket {
      geindiceerdZorgzwaartepakketID
      zzpCode
      ingangsdatum
      einddatum
      voorkeurClient
      instellingVoorkeur
      financiering
      commentaar
    }
    beperking {
      beperkingID
      categorie
      duur
      commentaar
    }
    stoornis {
      stoornisID
      grondslag
      diagnoseCodelijst
      diagnoseSubCodelijst
      ziektebeeldStoornis
      prognose
      commentaar
    }
    stoornisScore {
      stoornisScoreID
      stoornisVraag
      stoornisScore
      commentaar
    }
    wzd {
      wzdID
      wzdVerklaring
      ingangsdatum
      einddatum
    }
    client {
      clientID
      bsn
      geheimeClient
      geboorteDatum
      geboortedatumGebruik
      geslacht
      burgerlijkeStaat
      geslachtsnaam
      voorvoegselGeslachtsnaam
      partnernaam
      voorvoegselPartnernaam
      voornamen
      roepnaam
      voorletters
      naamGebruik
      leefeenheid
      agbcodeHuisarts
      communicatieVorm
      taal
      commentaar
      contactPersoon {
        contactPersoonID
        relatieNummer
        volgorde
        soortRelatie
        rol
        relatie
        voornamen
        roepnaam
        voorletters
        geslachtsnaam
        voorvoegselGeslachtsnaam
        partnernaam
        voorvoegselPartnernaam
        naamGebruik
        geslacht
        geboorteDatum
        geboortedatumGebruik
        ingangsdatum
        einddatum
        #   clientID
        contactGegevens {
          contactGegevensID
          #      clientID
          #       contactPersoonID
          adres {
            adresID
            adresSoort
            straatnaam
            huisnummer
            huisletter
            huisnummerToevoeging
            postcode
            plaatsnaam
            landCode
            aanduidingWoonadres
            ingangsdatum
            einddatum
          }
          telefoon {
            telefoonID
            telefoonnummer
            landnummer
            ingangsdatum
            einddatum
          }
          email {
            emailID
            emailadres
            ingangsdatum
            einddatum
          }
        }
      }
      contactGegevens {
        contactGegevensID
        adres {
          adresID
          adresSoort
          straatnaam
          huisnummer
          huisletter
          huisnummerToevoeging
          postcode
          plaatsnaam
          landCode
          aanduidingWoonadres
          ingangsdatum
          einddatum
        }
        telefoon {
          telefoonID
          telefoonnummer
          landnummer
          ingangsdatum
          einddatum
        }
        email {
          emailID
          emailadres
          ingangsdatum
          einddatum
        }
      }
    }
  }
}
